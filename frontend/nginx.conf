server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed build assets are immutable — cache hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # The service worker and its registration shim must never be cached, or
  # clients get stuck on a stale shell after a deploy.
  location = /sw.js {
    add_header Cache-Control "no-cache";
  }
  location = /registerSW.js {
    add_header Cache-Control "no-cache";
  }
  location = /manifest.json {
    add_header Cache-Control "no-cache";
  }

  # SPA history fallback — every unknown path serves the app shell.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
