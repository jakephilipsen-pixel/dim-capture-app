services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dimcapture
      POSTGRES_USER: gocold
      POSTGRES_PASSWORD: gocold
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gocold -d dimcapture"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      DATABASE_URL: postgresql://gocold:gocold@postgres:5432/dimcapture
      PORT: "3005"
      NODE_ENV: production
      FRONTEND_URL: http://localhost:5175
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 5s
      retries: 10
