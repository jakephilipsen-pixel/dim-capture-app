server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # M3 — suppress nginx version from Server response header.
  server_tokens off;

  # S7 — security headers applied to all responses.
  # add_header ... always; ensures they are present on error responses too.
  # Note: location blocks that set their own add_header directives do not
  # inherit these server-level directives (nginx design). Those locations
  # therefore carry an explicit copy of the security headers below.
  #
  # CSP rationale:
  #   default-src 'self'  — blanket same-origin restriction.
  #   script-src  'self'  — all JS is hashed/bundled by Vite, served from /.
  #   style-src   'self' 'unsafe-inline' — Tailwind bundle from /assets/, plus
  #                         inline style ATTRIBUTES that Radix UI (Dialog/Sheet,
  #                         via @radix-ui) sets for positioning/scroll-lock.
  #                         unsafe-inline applies to CSS only (no script risk);
  #                         script-src stays strict 'self'.
  #   img-src 'self' data: — favicons + any data: URIs React may emit for SVGs.
  #   connect-src 'self'  — all fetch/XHR targets are relative /api/* paths.
  #   worker-src  'self'  — Workbox service worker served from /sw.js.
  #   manifest-src 'self' — PWA manifest at /manifest.json.
  #   media-src   'self'  — ZXing assigns the camera stream via srcObject
  #                         (not createObjectURL), so blob: is not required.
  #   frame-ancestors 'none' — equivalent to X-Frame-Options: DENY but honoured
  #                            by modern browsers; both are set for compatibility.
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; media-src 'self'; frame-ancestors 'none';" always;

  # Hashed build assets are immutable — cache hard.
  # Security headers repeated here because location-level add_header
  # overrides any server-level add_header in this block.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; media-src 'self'; frame-ancestors 'none';" always;
    try_files $uri =404;
  }

  # The service worker and its registration shim must never be cached, or
  # clients get stuck on a stale shell after a deploy.
  location = /sw.js {
    add_header Cache-Control "no-cache";
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; media-src 'self'; frame-ancestors 'none';" always;
  }
  location = /registerSW.js {
    add_header Cache-Control "no-cache";
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; media-src 'self'; frame-ancestors 'none';" always;
  }
  location = /manifest.json {
    add_header Cache-Control "no-cache";
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; media-src 'self'; frame-ancestors 'none';" always;
  }

  # API proxy — single origin. The bundle is built with a relative API base
  # (VITE_API_URL=""), so the browser calls /api/* and nginx forwards it to the
  # backend over the compose network. A *variable* upstream defers DNS resolution
  # to request time, so nginx still boots when no backend is present (the
  # frontend-only smoke stack) — /api just 502s until a backend exists, and that
  # stack never calls it.
  location /api/ {
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $backend_upstream backend:3005;
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # SPA history fallback — every unknown path serves the app shell.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
