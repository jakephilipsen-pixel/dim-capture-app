# Smoke stack for floor-camera-flow (module 15).
#
# Boots the REAL backend image (prisma migrate deploy + serve) against a throwaway
# Postgres and the in-container v8 mock CartonCloud (dist/smoke/mockCc.js) — the
# mock is used ONLY to seed a SKU so the floor capture flow has a target. No real
# CartonCloud, no camera (the floor camera is browser-only; the smoke exercises the
# backend capture + carton-photo round trip).
#
# Happy path: seed a SKU → POST a floor dim with productType → POST a carton JPEG →
# GET it back. Host port 3013 for the backend (3010 dim-api, 3011 cc-oauth-write).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dimcapture
      POSTGRES_USER: gocold
      POSTGRES_PASSWORD: gocold
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gocold -d dimcapture"]
      interval: 3s
      timeout: 5s
      retries: 10

  mock-cc:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    command: ["node", "dist/smoke/mockCc.js"]
    environment:
      NODE_ENV: production
      MOCK_PORT: "9099"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --post-data='grant_type=client_credentials' 'http://localhost:9099/uaa/oauth/token' | grep -q access_token"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "3013:3005"
    environment:
      NODE_ENV: production
      PORT: "3005"
      DATABASE_URL: postgresql://gocold:gocold@postgres:5432/dimcapture
      CC_CLIENT_ID: smoke-id
      CC_CLIENT_SECRET: smoke-secret
      CC_TENANT_ID: smoke-tenant
      CC_CUSTOMER_ID: d4810e1e-91ab-43ed-b68e-b72bd858b122
      CC_BASE_URL: http://mock-cc:9099
      SYNC_SECRET: smoke-secret
      PHOTO_DIR: /app/data/photos
      FRONTEND_URL: http://localhost:5175
    depends_on:
      postgres:
        condition: service_healthy
      mock-cc:
        condition: service_healthy
