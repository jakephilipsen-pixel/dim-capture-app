server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed build assets are immutable — cache hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # The service worker and its registration shim must never be cached, or
  # clients get stuck on a stale shell after a deploy.
  location = /sw.js {
    add_header Cache-Control "no-cache";
  }
  location = /registerSW.js {
    add_header Cache-Control "no-cache";
  }
  location = /manifest.json {
    add_header Cache-Control "no-cache";
  }

  # API proxy — single origin. The bundle is built with a relative API base
  # (VITE_API_URL=""), so the browser calls /api/* and nginx forwards it to the
  # backend over the compose network. A *variable* upstream defers DNS resolution
  # to request time, so nginx still boots when no backend is present (the
  # frontend-only smoke stack) — /api just 502s until a backend exists, and that
  # stack never calls it.
  location /api/ {
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $backend_upstream backend:3005;
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # SPA history fallback — every unknown path serves the app shell.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
