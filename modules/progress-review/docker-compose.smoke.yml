# Smoke stack for progress-review (module 07).
#
# The Progress/Review pages have real runtime dependencies (sku list, dim list,
# PUT correction, sync), so the smoke boots the full stack: throwaway Postgres,
# in-container mock CartonCloud, the REAL backend image, and the REAL frontend
# image. The happy-path drives the API calls the two pages make (seed → list
# SKUs → list dims → capture → PUT correction → sync) and asserts the frontend
# serves the /progress and /review routes via SPA fallback.
#
# Host ports: backend 3011, frontend 5178 (Postgres + mock-cc internal-only).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dimcapture
      POSTGRES_USER: gocold
      POSTGRES_PASSWORD: gocold
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gocold -d dimcapture"]
      interval: 3s
      timeout: 5s
      retries: 10

  mock-cc:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    command: ["node", "dist/smoke/mockCc.js"]
    environment:
      NODE_ENV: production
      MOCK_PORT: "9099"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --post-data='grant_type=client_credentials' 'http://localhost:9099/uaa/oauth/token' | grep -q access_token"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "3011:3005"
    environment:
      NODE_ENV: production
      PORT: "3005"
      DATABASE_URL: postgresql://gocold:gocold@postgres:5432/dimcapture
      CC_CLIENT_ID: smoke-id
      CC_CLIENT_SECRET: smoke-secret
      CC_TENANT_ID: smoke-tenant
      CC_CUSTOMER_ID: d4810e1e-91ab-43ed-b68e-b72bd858b122
      CC_BASE_URL: http://mock-cc:9099
      SYNC_SECRET: smoke-secret
      FRONTEND_URL: http://localhost:5178
    depends_on:
      postgres:
        condition: service_healthy
      mock-cc:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/api/health | grep -q '\"db\":\"connected\"'"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "5178:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ >/dev/null 2>&1 || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10
